<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | Head Hunters</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #38bdf8;
            border: none;
            border-radius: 6px;
            color: #0f172a;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        button:hover {
            background: #7dd3fc;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Create New Password</h2>
        <p>Please enter your secure new password details below.</p>
        
        <form id="newPasswordForm">
            <div class="form-group">
                <label for="newPassword">New Password*</label>
                <input type="password" id="newPassword" placeholder="Enter new password" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password*</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
            </div>
            <button type="submit">Update Password</button>
        </form>
    </div>

    <script>
        document.getElementById('newPasswordForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            // Extract the dummy token from the URL bar
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            console.log("Resetting password using token:", token);

            // Local verification simulation
            alert("Success! Your password has been updated. Redirecting you back to login...");
            
            // Redirects them back to your main login page
            window.location.href = 'login.html'; 
        });
        document.getElementById('newPasswordForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (newPassword !== confirmPassword) {
        alert("❌ Passwords do not match!");
        return;
    }

    // Save the new password locally in the browser's memory!
    localStorage.setItem('savedPassword', newPassword);
    localStorage.setItem('savedEmail', 'ssianthuibabl@gmail.com'); // Creating a dummy account email

    alert("🚀 Success! Your password has been updated locally. Redirecting to login...");
    window.location.href = 'login.html'; 
});
    </script>
</body>
</html>
