<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Head Hunters</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #38bdf8;
            border: none;
            border-radius: 6px;
            color: #0f172a;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            margin-bottom: 20px;
        }

        button:hover {
            background: #7dd3fc;
        }

        button:active {
            transform: scale(0.98);
        }

        .back-link {
            display: inline-block;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #38bdf8;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Reset Password</h2>
        <p>Enter your email to receive a secure reset link.</p>
        
        <form id="forgotPasswordForm">
            <div class="form-group">
                <label for="resetEmail">Email Address</label>
                <input type="email" id="resetEmail" placeholder="Enter your email address" required>
            </div>
            <button type="submit">Send Reset Link</button>
        </form>
        
        <a href="login.html" class="back-link">← Back to Login</a>
    </div>

   <script>
    document.getElementById('forgotPasswordForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        // 1. Get the email the user typed
        const email = document.getElementById('resetEmail').value;

        // 2. Visual feedback
        const btn = e.target.querySelector('button');
        btn.innerText = "Sending...";
        btn.disabled = true;

        // 3. Simulate a short network delay (1 second) then redirect
        setTimeout(() => {
            const dummyToken = "HT_SECURE_TOKEN_2026";
            
            alert("Success! A reset link has been generated locally. Redirecting you to the new password page...");
            
            // 4. Automatically takes you to the next page with the token attached!
            window.location.href = `reset-password.html?token=${dummyToken}`;
        }, 1000);
    });
</script>
</body>
</html>
