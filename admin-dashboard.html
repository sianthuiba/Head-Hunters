<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Head Hunters Global</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { min-height: 100vh; background: linear-gradient(135deg, #111827, #1f2937); color: white; padding: 40px; }
        .admin-container { max-width: 800px; margin: 0 auto; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        h1 { margin-bottom: 20px; color: #ffc107; font-size: 28px; }
        .stats-box { background: #ffc107; color: #111827; padding: 20px; border-radius: 10px; display: inline-block; margin-bottom: 30px; font-weight: bold; font-size: 18px; }
        .stats-box span { font-size: 32px; display: block; }
        h3 { margin-bottom: 15px; font-size: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px; }
        .user-list { list-style: none; }
        .user-item { background: rgba(255,255,255,0.08); padding: 12px 20px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .user-email { font-weight: 500; }
        .actions { display: flex; gap: 10px; align-items: center; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge.active { background: #28a745; color: white; }
        .badge.blocked { background: #dc3545; color: white; }
        .block-btn { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; transition: opacity 0.2s; }
        .block-btn:hover { opacity: 0.8; }
        .unblock-btn { background: #28a745; color: white; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>Head Hunters Global — Admin Panel</h1>
    
    <div class="stats-box">
        Total Registered Users
        <span id="totalCounter">0</span>
    </div>

    <h3>Registered Users Directory</h3>
    <ul class="user-list" id="userListContainer"></ul>
</div>

<script>
    function renderUsers() {
        let registeredUsersList = JSON.parse(localStorage.getItem('savedUsers')) || ["admin@gmail.com", "testuser@gmail.com"];
        let blockedUsersList = JSON.parse(localStorage.getItem('blockedUsers')) || [];

        document.getElementById('totalCounter').innerText = registeredUsersList.length;
        const listContainer = document.getElementById('userListContainer');
        listContainer.innerHTML = ''; // Clear prior entries
        
        registeredUsersList.forEach(email => {
            const isBlocked = blockedUsersList.includes(email);
            const li = document.createElement('li');
            li.className = 'user-item';
            
            li.innerHTML = `
                <span class="user-email" style="${isBlocked ? 'text-decoration: line-through; opacity: 0.5;' : ''}">${email}</span>
                <div class="actions">
                    <span class="badge ${isBlocked ? 'blocked' : 'active'}">${isBlocked ? 'Blocked' : 'Active'}</span>
                    <button class="block-btn ${isBlocked ? 'unblock-btn' : ''}" onclick="toggleBlock('${email}')">
                        ${isBlocked ? 'Unblock' : 'Block'}
                    </button>
                </div>
            `;
            listContainer.appendChild(li);
        });
    }

    function toggleBlock(email) {
        let blockedUsersList = JSON.parse(localStorage.getItem('blockedUsers')) || [];
        
        if (blockedUsersList.includes(email)) {
            // Unblock user
            blockedUsersList = blockedUsersList.filter(e => e !== email);
        } else {
            // Block user
            blockedUsersList.push(email);
        }
        
        localStorage.setItem('blockedUsers', JSON.stringify(blockedUsersList));
        renderUsers(); // Refresh layout updates instantly
    }

    // Run layout generator on startup
    renderUsers();
</script>

</body>
</html>
