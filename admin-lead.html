<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Head Hunters</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0d6efd,#0047b3);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{
    width:400px;
    background:#fff;
    padding:40px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.logo{
    text-align:center;
    color:#0d6efd;
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:6px;
    background:#0d6efd;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#0047b3;
}

.error{
    display:none;
    color:red;
    margin-top:15px;
    text-align:center;
}

.success{
    display:none;
    color:green;
    margin-top:15px;
    text-align:center;
}

.back-home{
    text-align:center;
    margin-top:20px;
}

.back-home a{
    text-decoration:none;
    color:#0d6efd;
}
</style>
</head>

<body>

<div class="login-container">

<div class="logo">Head Hunters</div>

<p class="subtitle">
Administrator Login
</p>

<form id="loginForm">

<div class="form-group">
<label>Username</label>
<input type="text" id="username" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" required>
</div>

<button type="submit">
Login
</button>

<div id="success" class="success">
Login Successful...
</div>

<div id="error" class="error">
Invalid Username or Password
</div>

</form>

<div class="back-home">
<a href="index.html">← Back to Home</a>
</div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

e.preventDefault();

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

if(username === "doveiasian@headhunters.com" && password === "Doveiasian@2026")
{
document.getElementById("success").style.display="block";
document.getElementById("error").style.display="none";

setTimeout(function(){
window.location.href="dashboard.html";
},1000);

}
else
{
document.getElementById("error").style.display="block";
document.getElementById("success").style.display="none";
}

});

</script>

</body>
</html>
